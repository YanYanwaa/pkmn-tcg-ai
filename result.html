        useEffect(() => {
          const element = ref.current;

          // A single function to render a static frame (for resizes and step changes)
          const renderStaticFrame = async () => {
            if (!ref.current) return;
            try {
              // Pass a frame of 1 to indicate a final/static state
              await renderer({
                ...context,
                frame: 1,
                height: ref.current.clientHeight,

            }
          };

          // --- Resize Handling ---
          const observer = new ResizeObserver(() => {
            renderStaticFrame();
          });
          observer.observe(element);

          // --- Animation Loop ---
          let start = Date.now();
          const renderAnimation = async () => {
            // Stop the loop if the component unmounts or if animate is turned off

          }

          return () => {
            observer.disconnect();
            cancelAnimationFrame(animationFrameId.current);
          };

            background: green;
          }
        }
      `;

      const PlayButton = styled.button`
        align-items: center;
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        display: flex;
        flex: 0 0 56px;
        font-size: 20px;
        height: 40px;
        justify-content: center;
        opacity: 0.8;
        outline: none;
        transition: opacity 0.2s;

        &:hover {
          opacity: 1;
        }
      `;

      const StepCount = styled.span`
        align-items: center;
        color: white;
        display: flex;
        font-size: 14px;
        justify-content: center;
        opacity: 0.8;
        padding: 0 16px;
        pointer-events: none;
      `;

      const Controls = styled((props) => {
        const { environment, pause, play, playing, setStep, step } =
          useContext(Context);
        const value = step + 1;
        const onClick = () => (playing ? pause() : play());
        const onInput = (e) => {
          pause();
          setStep(parseInt(e.target.value) - 1);
        };

        return h`
          <div className=${props.className}>
            <${PlayButton} onClick=${onClick}><svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" viewBox="0 0 24 24" fill="#FFFFFF">${
              playing
                ? h`<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/><path d="M0 0h24v24H0z" fill="none"/>`
                : h`<path d="M8 5v14l11-7z"/><path d="M0 0h24v24H0z" fill="none"/>`
            }</svg><//>
            <${StepInput} min="1" max=${environment.steps.length} value="${value}" onInput=${onInput} />
            <${StepCount}>${value} / ${environment.steps.length}<//>
          </div>
        `;
      })`
        align-items: center;
        border-top: 4px solid #212121;
        display: flex;
        flex: 0 0 44px;
        width: 100%;
      `;

      const Info = styled((props) => {
        const {
          environment,
          playing,
          step,
          speed,
          animate,
          header,
          controls,
          settings,
        } = useContext(Context);

        return h`
          <div className=${props.className}>
            info:
            step(${step}),
            playing(${playing ? "T" : "F"}),
            speed(${speed}),
            animate(${animate ? "T" : "F"})
          </div>`;
      })`
        color: #888;
        font-family: monospace;
        font-size: 12px;
      `;

      const Settings = styled((props) => {
        const { environment, pause, play, playing, setStep, step } =
          useContext(Context);

        return h`
          <div className=${props.className}>
            <${Info} />
          </div>
        `;
      })`
        background: #fff;
        border-top: 4px solid #212121;
        box-sizing: border-box;
        padding: 20px;
        width: 100%;

        h1 {
          font-size: 20px;
        }
      `;

      const Player = styled((props) => {
        const context = useContext(Context);
        const { agents, controls, header, legend, loading, settings, width } =
          context;
        return h`
          <div className=${props.className}>
            ${loading && h`<${Loading} />`}
            ${!loading && header && h`<${Header} />`}
            ${!loading && h`<${Viewer} />`}
            ${!loading && legend && agents?.length > 0 && h`<${Legend} width=${width}/>`}
            ${!loading && controls && h`<${Controls} />`}
            ${!loading && settings && h`<${Settings} />`}
          </div>`;
      })`
        align-items: center;
        background: #212121;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        height: 100%;
        justify-content: center;
        position: relative;
        width: 100%;
        &:not(.no-border) {
          border: 4px solid #212121;
        }
      `;

      const App = () => {
        const renderCountRef = useRef(0);
        const [_, setRenderCount] = useState(0);

        // These are bindings to the 0-9 keys and are milliseconds of timeout per step
        const speeds = [
          0,
          3000,
          1000,
          500,
          333, // Default
          200,
          100,
          50,
          25,
          10,
        ];

        const contextRef = useRef({
          animate: false,
          agents: [],
          controls: false,
          debug: false,
          environment: { steps: [], info: {} },
          header: window.innerHeight >= 600,
          height: window.innerHeight,
          interactive: false,
          legend: true,
          loading: false,
          playing: false,
          processing: false,
          renderer: () => "DNE",
          settings: false,
          speed: speeds[4],
          step: 0,
          width: window.innerWidth,
        });

        // Context helpers.
        const rerender = (contextRef.current.rerender = () =>
          setRenderCount((renderCountRef.current += 1)));
        const setStep = (contextRef.current.setStep = (newStep) => {
          contextRef.current.step = newStep;
          rerender();
        });
        const setPlaying = (contextRef.current.setPlaying = (playing) => {
          contextRef.current.playing = playing;
          rerender();
        });
        const pause = (contextRef.current.pause = () => setPlaying(false));

        const playNext = () => {
          const context = contextRef.current;

          if (
            context.playing &&
            context.step < context.environment.steps.length - 1
          ) {
            setStep(context.step + 1);
            play(true);
          } else {
            pause();
          }
        };

        const play = (contextRef.current.play = (continuing) => {
          const context = contextRef.current;
          if (context.playing && !continuing) return;
          if (!context.playing) setPlaying(true);
          if (
            !continuing &&
            context.step === context.environment.steps.length - 1
          ) {
            setStep(0);
          }
          setTimeout(playNext, context.speed);
        });

        // Use useState to hold the functions that components will use.
        // We initialize them with the original functions.
        const [playFn, setPlayFn] = useState(() => contextRef.current.play);
        const [pauseFn, setPauseFn] = useState(() => contextRef.current.pause);
        const [stepFn, setStepFn] = useState(() => contextRef.current.setStep);
        const [playingFn, setPlayingFn] = useState(() => contextRef.current.setPlaying);

        const updateContext = (o) => {
          const context = contextRef.current;
          Object.assign(context, o, {
            environment: { ...context.environment, ...(o.environment || {}) },
          });
          rerender();
        };

        contextRef.current.setPlay = setPlayFn;
        contextRef.current.setPause = setPauseFn;
        contextRef.current.setSetStep = setStepFn;
        contextRef.current.setSetPlaying = setPlayingFn;

        // First time setup.
        useEffect(() => {
          // Timeout is used to ensure useEffect renders once.
          setTimeout(() => {
            // Initialize context with window.kaggle.
            updateContext(window.kaggle || {});

            if (window.kaggle?.playing) {
              play(true);
            }

            // Listen for messages received to update the context.
            window.addEventListener(
              "message",
              (event) => {
                // Ensure the environment names match before updating.
                try {
                  if (
                    event.data.environment?.name ==
                      contextRef.current.environment.name ||
                    (event.data.environment?.name &&
                      !contextRef.current.environment.name) ||
                    event.data.environment?.loading !==
                      contextRef.current.environment.loading
                  ) {
                    const nextContext = {
                      ...event.data,
                      environment: {
                        ...event.data.environment,
                        steps: event.data.environment?.steps ?? [],
                      },
                    };
                    if (
                      !nextContext.renderer ||
                      typeof nextContext.renderer !== "function"
                    ) {
                      nextContext.renderer = contextRef.current.renderer;
                    }
                    window.kaggle = nextContext;
                    updateContext(nextContext);
                  }
                  if (event.data.setSteps) {
                    const nextContext = {
                      ...(window.kaggle ?? {}),
                      environment: {
                        ...(window.kaggle?.environment ?? {}),
                        steps: event.data.setSteps,
                      },
                    };
                    if (
                      !nextContext.renderer ||
                      typeof nextContext.renderer !== "function"
                    ) {
                      nextContext.renderer = contextRef.current.renderer;
                    }

                    window.kaggle = nextContext;
                    updateContext(nextContext);
                  }

                  // Side load the renderer script if it is specified by the post message event and not already loaded.
                  const renderScriptId = "rendererScript";
                  if (
                    event.data.environment?.rendererUrl &&
                    !document.querySelector(`#${renderScriptId}`)
                  ) {
                    window.rendererUrl = event.data.environment?.rendererUrl;
                    const script = document.createElement("script");
                    script.id = renderScriptId;
                    script.onload = () => {
                      window.kaggle.renderer = window.renderer;
                    };
                    script.src = window.rendererUrl;
                    document.body.appendChild(script);
                  }
                } catch {}
              },
              false,
            );
            // Listen for keyboard commands.
            window.addEventListener(
              "keydown",
              (event) => {
                const {
                  interactive,
                  isInteractive,
                  playing,
                  step,
                  environment,
                } = contextRef.current;
                const key = event.keyCode;
                const zero_key = 48;
                const nine_key = 57;
                if (
                  interactive ||
                  isInteractive() ||
                  (key !== 32 &&
                    key !== 37 &&
                    key !== 39 &&
                    !(key >= zero_key && key <= nine_key))
                )
                  return;

                if (key === 32) {
                  playing ? pause() : play();
                } else if (key === 39) {
                  contextRef.current.playing = false;
                  if (step < environment.steps.length - 1) setStep(step + 1);
                  rerender();
                } else if (key === 37) {
                  contextRef.current.playing = false;
                  if (step > 0) setStep(step - 1);
                  rerender();
                } else if (key >= zero_key && key <= nine_key) {
                  contextRef.current.speed = speeds[key - zero_key];
                }
                event.preventDefault();
                return false;
              },
              false,
            );
          }, 1);
        }, []);

        if (contextRef.current.debug) {
          console.log("context", contextRef.current);
        }

        // Ability to update context.
        contextRef.current.update = updateContext;

        // Ability to communicate with ipython.
        const execute = (contextRef.current.execute = (source) =>
          new Promise((resolve, reject) => {
            try {
              window.parent.IPython.notebook.kernel.execute(source, {
                iopub: {
                  output: (resp) => {
                    const type = resp.msg_type;
                    if (type === "stream") return resolve(resp.content.text);
                    if (type === "error") return reject(new Error(resp.evalue));
                    return reject(new Error("Unknown message type: " + type));
                  },
                },
              });
            } catch (e) {
              reject(new Error("IPython Unavailable: " + e));
            }
          }));

        // Ability to return an action from an interactive session.
        contextRef.current.act = (action) => {
          const id = contextRef.current.environment.id;
          updateContext({ processing: true });
          execute(`
            import json
            from kaggle_environments import interactives
            if "${id}" in interactives:
                action = json.loads('${JSON.stringify(action)}')
                env, trainer = interactives["${id}"]
                trainer.step(action)
                print(json.dumps(env.steps))`)
            .then((resp) => {
              try {
                updateContext({
                  processing: false,
                  environment: { steps: JSON.parse(resp) },
                });
                play();
              } catch (e) {
                updateContext({ processing: resp.split("\n")[0] });
                console.error(resp, e);
              }
            })
            .catch((e) => console.error(e));
        };

        // Check if currently interactive.
        contextRef.current.isInteractive = () => {
          const context = contextRef.current;
          const steps = context.environment.steps;
          return (
            context.interactive &&
            !context.processing &&
            context.step === steps.length - 1 &&
            steps[context.step].some((s) => s.status === "ACTIVE")
          );
        };

        // Create a new value object on every render.
        // This object includes the *current* play/pause functions from useState.
        const providerValue = { ...contextRef.current, play: playFn, pause: pauseFn, setStep: stepFn, setPlaying: playingFn };

        return h`
          <${Context.Provider} value=${providerValue}>
            <${Player} className="${contextRef.current.environment.viewer ? "no-border" : ""}" />
          <//>`;
      };

      preact.render(h`<${App} />`, document.body);
    </script>
  </body>
</html>
